version: "3.9"

services:
  upscaler-api:
    build: .
    container_name: realesrgan-upscaler
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      # Persist models and output across container restarts
      - ./models:/app/models
      - ./output:/app/output
      - ./upscaler.db:/app/upscaler.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
